name = "pec-config"
main = "worker.js"
compatibility_date = "2024-11-01"

# Created by `wrangler kv namespace create CONFIG` — paste the printed id here.
kv_namespaces = [
  { binding = "CONFIG", id = "REPLACE_WITH_KV_ID" }
]

